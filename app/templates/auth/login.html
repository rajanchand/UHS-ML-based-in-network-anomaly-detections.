{% extends 'base.html' %}
{% block title %}Log In - Aegis ML-IDS{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-md-5 col-lg-4">
        <div class="card auth-card border-0 p-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary-light text-primary rounded-circle mb-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-shield-lock-fill fs-2"></i>
                    </div>
                    <h4 class="fw-bold tracking-tight text-dark mb-1">Welcome back</h4>
                    <p class="text-muted fs-7">Enter your credentials to access Aegis ML-IDS</p>
                </div>

                <form method="POST" action="{{ url_for('auth.login') }}" autocomplete="off">
                    <!-- CSRF Token -->
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <!-- Username input -->
                    <div class="mb-3">
                        <label for="username" class="form-label fs-7 fw-semibold text-dark">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control bg-light border-start-0 fs-7" id="username" name="username" placeholder="Enter username" required autofocus>
                        </div>
                    </div>

                    <!-- Password input -->
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="password" class="form-label fs-7 fw-semibold text-dark mb-0">Password</label>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control bg-light border-start-0 fs-7" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary w-100 py-2.5 rounded-3 fs-7 mb-3 shadow-sm">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Log In
                    </button>
                </form>

                <div class="text-center mt-3">
                    <p class="text-muted fs-7 mb-0">Don't have an account? <a href="{{ url_for('auth.register') }}" class="fw-semibold text-decoration-none">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
