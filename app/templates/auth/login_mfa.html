{% extends 'base.html' %}
{% block title %}MFA Verification - ML-Network Anomaly Detections{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-md-5 col-lg-4">
        <div class="card auth-card border-0 p-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-warning-light text-warning rounded-circle mb-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-shield-fill-check fs-2"></i>
                    </div>
                    <h4 class="fw-bold tracking-tight text-dark mb-1">MFA Challenge</h4>
                    <p class="text-muted fs-7">Enter the 6-digit code from your authenticator app.</p>
                </div>

                <form method="POST" action="{{ url_for('auth.login_mfa') }}" autocomplete="off">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-4">
                        <label for="code" class="form-label fs-7 fw-semibold text-dark mb-1">Verification Code</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-patch-check"></i></span>
                            <input type="text" class="form-control bg-light border-start-0 fs-7 text-center fw-bold letter-spacing-lg" id="code" name="code" placeholder="000 000" maxlength="6" required autofocus>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fs-7 mb-3 shadow-sm">
                        Verify Code
                    </button>
                    
                    <div class="text-center">
                        <a href="{{ url_for('auth.login') }}" class="fs-8 text-muted text-decoration-none">Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
