# =============================================================================
# Aegis ML-IDS - Production Orchestration Configuration
# =============================================================================

version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: aegis_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anomaly_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-anomaly_detection}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Service (Flask + Gunicorn)
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: aegis_web
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-anomaly_user}:${POSTGRES_PASSWORD:-secure_password_here}@db:5432/${POSTGRES_DB:-anomaly_detection}
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-long-random-string-in-production}
      - FLASK_ENV=production
      - SESSION_COOKIE_SECURE=true
      - RATELIMIT_STORAGE_URL=memory://
    volumes:
      - uploads_data:/app/uploads
      - reports_data:/app/reports
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy

  # Reverse Proxy Service (Nginx)
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: aegis_nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - logs_data:/var/log/nginx

volumes:
  postgres_data:
  uploads_data:
  reports_data:
  logs_data:
